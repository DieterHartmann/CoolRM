<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #1f2937;
      background: #fff;
      padding: 24px;
    }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #111827; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .req { color: #ef4444; margin-left: 2px; }
    input, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      color: #1f2937;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus {
      border-color: #6d28d9;
      box-shadow: 0 0 0 3px rgba(109,40,217,0.12);
    }
    textarea { resize: vertical; min-height: 90px; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }
    .btn:hover:not(:disabled) { background: #5b21b6; }
    .btn:disabled { background: #a78bfa; cursor: not-allowed; }
    .err { font-size: 13px; color: #ef4444; margin-top: 10px; display: none; }
    .err.show { display: block; }
    #loading { color: #9ca3af; font-size: 14px; }

    #success { text-align: center; padding: 40px 16px; display: none; }
    #success.show { display: block; }
    .check-circle {
      width: 56px; height: 56px;
      background: #ede9fe;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 26px;
      color: #6d28d9;
    }
    #success h2 { font-size: 18px; margin-bottom: 8px; }
    #success p { color: #6b7280; font-size: 14px; }
    .ref-badge {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      font-family: ui-monospace, monospace;
      font-size: 14px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <div id="form-wrap">
    <h2>Get in touch</h2>
    <div id="loading">Loading…</div>
    <form id="form" novalidate style="display:none">
      <div id="fields-container"></div>
      <button class="btn" type="submit" id="btn">Send message</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <div id="success">
    <div class="check-circle">✓</div>
    <h2>Message received!</h2>
    <div class="ref-badge" id="ref-badge"></div>
    <p>We'll be in touch soon. Keep your reference number handy.</p>
  </div>

  <script>
    var key = new URLSearchParams(location.search).get('key');
    var fields = [];
    var STANDARD = ['name', 'email', 'phone', 'message'];

    var btn = document.getElementById('btn');
    var errEl = document.getElementById('err');
    var formWrap = document.getElementById('form-wrap');
    var successEl = document.getElementById('success');
    var refBadge = document.getElementById('ref-badge');
    var formEl = document.getElementById('form');
    var loadingEl = document.getElementById('loading');
    var fieldsContainer = document.getElementById('fields-container');

    function sendHeight() {
      window.parent.postMessage({ crmHeight: document.body.scrollHeight }, '*');
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderForm(cfg) {
      fields = cfg;
      fieldsContainer.innerHTML = cfg.map(function(field) {
        var reqSpan = field.required ? '<span class="req">*</span>' : '';
        var ph = esc(field.placeholder || '');
        var inputHtml;
        if (field.type === 'textarea') {
          inputHtml = '<textarea id="f-' + esc(field.id) + '" rows="4" placeholder="' + ph + '"></textarea>';
        } else {
          var ac = field.id === 'name' ? ' autocomplete="name"'
                 : field.id === 'email' ? ' autocomplete="email"'
                 : field.id === 'phone' ? ' autocomplete="tel"' : '';
          inputHtml = '<input id="f-' + esc(field.id) + '" type="' + esc(field.type) + '" placeholder="' + ph + '"' + ac + '>';
        }
        return '<div class="field"><label for="f-' + esc(field.id) + '">' + esc(field.label) + reqSpan + '</label>' + inputHtml + '</div>';
      }).join('');
      loadingEl.style.display = 'none';
      formEl.style.display = '';
      setTimeout(sendHeight, 50);
    }

    async function loadConfig() {
      if (!key) {
        loadingEl.textContent = 'Widget configuration error. Please contact the site owner.';
        return;
      }
      try {
        var res = await fetch('/api/v1/widget/' + encodeURIComponent(key) + '/config');
        var data = await res.json();
        if (!data.success) throw new Error(data.error || 'Config error');
        renderForm(data.data.fields);
      } catch (e) {
        loadingEl.textContent = 'Failed to load form. Please refresh the page.';
        sendHeight();
      }
    }

    window.addEventListener('load', loadConfig);

    formEl.addEventListener('submit', async function(e) {
      e.preventDefault();
      errEl.className = 'err';
      errEl.textContent = '';

      var body = { widget_key: key };
      var customFields = {};

      for (var i = 0; i < fields.length; i++) {
        var field = fields[i];
        var el = document.getElementById('f-' + field.id);
        if (!el) continue;
        var val = el.value.trim();

        if (field.required && !val) {
          showErr((field.label || field.id) + ' is required.');
          return;
        }

        if (field.id === 'email' && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
          showErr('Please enter a valid email address.');
          return;
        }

        if (STANDARD.indexOf(field.id) !== -1) {
          if (val) body[field.id] = val;
        } else {
          if (val) customFields[field.id] = val;
        }
      }

      if (Object.keys(customFields).length > 0) {
        body.custom_fields = customFields;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        var res = await fetch('/api/v1/contacts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.error || 'Something went wrong. Please try again.');
        }
        refBadge.textContent = data.data.ref;
        formWrap.style.display = 'none';
        successEl.className = 'show';
        sendHeight();
      } catch(err) {
        showErr(err.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Send message';
      }
    });

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.className = 'err show';
      sendHeight();
    }
  </script>
</body>
</html>
