services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crmplatform}
      POSTGRES_USER: ${POSTGRES_USER:-crmapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crmapp} -d ${POSTGRES_DB:-crmplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    command: >
      sh -c "node apps/api/dist/migrate.js && node apps/api/dist/index.js"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-crmapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crmplatform}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    command: ["node", "apps/api/dist/worker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-crmapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crmplatform}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "3000:80"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
